<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.atharv's.com</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebe5 0%, #d4f1f4 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #05445e;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #05445e;
        }

        p {
            font-size: 14px;
            color: #757575;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-button {
            background-color: #189ad3;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .link-button:hover {
            background-color: #05445e;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Section -->
        <div class="profile-img">🚀</div>
        <h1>Atharv</h1>
        <p>Welcome to my official space! Check out my links below.</p>

        <!-- Links Section -->
        <div class="links-container">
            <a href="https://github.com" target="_blank" class="link-button">Atharv's GitHub</a>
            <a href="https://linkedin.com" target="_blank" class="link-button">Connect on LinkedIn</a>
            <a href="https://google.com" target="_blank" class="link-button">Visit My Blog</a>
        </div>
    </div>

</body>
</html>
